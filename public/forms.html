<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harris Towing &amp; Recovery Forms</title>
</head>
<body>
    <!-- This file is for Netlify Form detection -->
    <form name="harris-contact" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <select name="service_type">
            <option value="emergency">Emergency Towing</option>
            <option value="transport">Scheduled Transport</option>
            <option value="junk">Junk Car Removal</option>
            <option value="roadside">Roadside Assistance</option>
        </select>
        <textarea name="message"></textarea>
        <input type="file" name="photos" multiple />
    </form>
</body>
</html>
